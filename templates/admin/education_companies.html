{% extends "base.html" %}
{% block title %}教育公司关键词 - WiseReporter{% endblock %}

{% block extra_css %}
<style>
    .ec-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
    }
    .ec-header h1 { margin: 0; font-size: 20px; color: #333; }
    .ec-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    .btn {
        padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer;
        font-size: 13px; font-weight: 500; transition: all 0.2s; text-decoration: none;
    }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1557b0; }
    .btn-success { background: #0d9488; color: #fff; }
    .btn-success:hover { background: #0f766e; }
    .btn-warning { background: #f59e0b; color: #fff; }
    .btn-warning:hover { background: #d97706; }
    .btn-danger { background: #ef4444; color: #fff; padding: 2px 8px; font-size: 11px; border-radius: 4px; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline { background: #fff; color: #333; border: 1px solid #d1d5db; }
    .btn-outline:hover { background: #f9fafb; }

    .ec-info {
        background: #f0f9ff; border: 1px solid #bae6fd; color: #0c4a6e;
        padding: 12px 16px; border-radius: 8px; margin-bottom: 20px;
        font-size: 13px; line-height: 1.6;
    }
    .ec-info strong { color: #0369a1; }

    /* 分类卡片 */
    .ec-category-section {
        background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        margin-bottom: 20px; overflow: hidden;
    }
    .ec-category-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 20px; background: #f8fafc; border-bottom: 1px solid #e5e7eb;
    }
    .ec-category-title {
        font-size: 15px; font-weight: 600; color: #1e293b; display: flex; align-items: center; gap: 8px;
    }
    .ec-category-title .icon { font-size: 18px; }
    .ec-category-title .count { font-size: 12px; color: #64748b; font-weight: 400; }
    .ec-category-body { padding: 16px 20px; }

    /* 关键词表格 */
    .ec-keyword-table { width: 100%; border-collapse: collapse; }
    .ec-keyword-table th {
        text-align: left; padding: 8px 12px; font-size: 12px; color: #94a3b8;
        font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;
        border-bottom: 1px solid #e5e7eb;
    }
    .ec-keyword-table td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; color: #374151; }
    .ec-keyword-table tr:hover td { background: #f8fafc; }
    .ec-keyword-table .kw-col { font-weight: 500; }
    .ec-keyword-table .act-col { width: 80px; text-align: right; }
    .ec-empty-row td { text-align: center; color: #94a3b8; padding: 24px; font-size: 13px; }

    /* 添加表单 */
    .ec-add-bar {
        display: flex; gap: 8px; margin-bottom: 20px; align-items: center;
    }
    .ec-add-bar input {
        flex: 1; padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 6px;
        font-size: 13px; min-width: 200px;
    }
    .ec-add-bar input:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,.15); }
    .ec-add-bar select {
        padding: 9px 12px; border: 1px solid #d1d5db; border-radius: 6px;
        font-size: 13px; background: #fff; cursor: pointer;
    }
    .ec-add-bar select:focus { outline: none; border-color: #1a73e8; }

    /* Toast */
    .ec-toast {
        position: fixed; top: 20px; right: 20px; z-index: 9999;
        padding: 12px 20px; border-radius: 8px; font-size: 14px; color: #fff;
        animation: ecSlideIn 0.3s ease; box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }
    .ec-toast.success { background: #059669; }
    .ec-toast.error { background: #dc2626; }
    .ec-toast.info { background: #1a73e8; }

    @keyframes ecSlideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }
</style>
{% endblock %}

{% block content %}
<div class="ec-header">
    <h1>教育公司关键词</h1>
    <div class="ec-actions">
        <button class="btn btn-success" onclick="initKeywords()" id="btn-init">导入默认词库</button>
        <button class="btn btn-warning" onclick="recheck()" id="btn-recheck">重新检查已有资讯</button>
    </div>
</div>

<div class="ec-info">
    <strong>筛选逻辑：</strong>当投融资/财报资讯的标题、摘要或正文中出现下方任一关键词时，系统会自动收藏并在周报中呈现。
</div>

<div class="ec-add-bar">
    <input type="text" id="keyword-input" placeholder="输入关键词，回车添加" onkeydown="if(event.key==='Enter')addKeyword()">
    <select id="category-select">
        <option value="education_company">教育公司中英文名称</option>
        <option value="other">其他教育相关关键词</option>
    </select>
    <button class="btn btn-primary" onclick="addKeyword()">添加</button>
</div>

<div id="categories-container">
    <div style="text-align:center;padding:40px;color:#94a3b8;">加载中...</div>
</div>

<div id="toast-container"></div>
{% endblock %}

{% block extra_js %}
<script>
function showToast(msg, type) {
    type = type || 'info';
    var t = $('<div class="ec-toast ' + type + '">' + msg + '</div>');
    $('#toast-container').append(t);
    setTimeout(function(){ t.fadeOut(300, function(){ t.remove(); }); }, 2500);
}

function loadKeywords() {
    $.get('/api/settings/education-companies', function(res) {
        if (res.code === 0) {
            var categories = res.data.categories;
            var html = '';
            for (var i = 0; i < categories.length; i++) {
                var cat = categories[i];
                html += renderCategory(cat);
            }
            if (categories.length === 0) {
                html = '<div style="text-align:center;padding:40px;color:#94a3b8;">暂无关键词，请添加或导入默认词库</div>';
            }
            $('#categories-container').html(html);
        } else {
            showToast('加载失败: ' + res.message, 'error');
        }
    });
}

function renderCategory(cat) {
    var icon = cat.key === 'education_company' ? '🏢' : '🏷️';
    var rows = '';
    if (cat.items.length === 0) {
        rows = '<tr class="ec-empty-row"><td colspan="2">暂无关键词</td></tr>';
    } else {
        for (var j = 0; j < cat.items.length; j++) {
            var item = cat.items[j];
            rows += '<tr>' +
                '<td class="kw-col">' + esc(item.keyword) + '</td>' +
                '<td class="act-col"><button class="btn btn-danger" onclick="deleteKeyword(' + item.id + ',\'' + esc(item.keyword) + '\')" title="删除">✕</button></td>' +
                '</tr>';
        }
    }
    return '<div class="ec-category-section">' +
        '<div class="ec-category-header">' +
        '<span class="ec-category-title"><span class="icon">' + icon + '</span>' + esc(cat.label) + '<span class="count">（' + cat.count + ' 个）</span></span>' +
        '</div>' +
        '<div class="ec-category-body">' +
        '<table class="ec-keyword-table"><tbody>' + rows + '</tbody></table>' +
        '</div>' +
        '</div>';
}

function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function addKeyword() {
    var keyword = $('#keyword-input').val().trim();
    var category = $('#category-select').val();
    if (!keyword) { showToast('请输入关键词', 'error'); return; }

    $.ajax({
        url: '/api/settings/education-companies',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({keyword: keyword, category: category}),
        success: function(res) {
            if (res.code === 0) {
                showToast(res.message, 'success');
                $('#keyword-input').val('');
                loadKeywords();
            } else {
                showToast(res.message, 'error');
            }
        },
        error: function() { showToast('网络错误', 'error'); }
    });
}

function deleteKeyword(id, name) {
    if (!confirm('确定要删除关键词「' + name + '」吗？')) return;
    $.ajax({
        url: '/api/settings/education-companies/' + id,
        type: 'DELETE',
        success: function(res) {
            if (res.code === 0) {
                showToast(res.message, 'success');
                loadKeywords();
            } else {
                showToast(res.message, 'error');
            }
        },
        error: function() { showToast('网络错误', 'error'); }
    });
}

function initKeywords() {
    var btn = $('#btn-init');
    btn.prop('disabled', true).text('导入中...');
    $.ajax({
        url: '/api/settings/education-companies/init',
        type: 'POST',
        success: function(res) {
            if (res.code === 0) {
                showToast(res.message, 'success');
                loadKeywords();
            } else {
                showToast(res.message, 'error');
            }
        },
        error: function() { showToast('网络错误', 'error'); },
        complete: function() { btn.prop('disabled', false).text('导入默认词库'); }
    });
}

function recheck() {
    var btn = $('#btn-recheck');
    btn.prop('disabled', true).text('检查中...');
    $.ajax({
        url: '/api/settings/education-companies/recheck',
        type: 'POST',
        success: function(res) {
            showToast(res.message || '操作完成', res.code === 0 ? 'success' : 'error');
        },
        error: function() { showToast('网络错误', 'error'); },
        complete: function() { btn.prop('disabled', false).text('重新检查已有资讯'); }
    });
}

$(function() { loadKeywords(); });
</script>
{% endblock %}
