{% extends "base.html" %}

{% block title %}注册 - WiseReporter{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>账号注册</h1>
        <p style="text-align:center;color:#666;margin-bottom:20px;">
            系统已关闭自主注册。<br>
            如需创建账号，请联系超级管理员（admin）。
        </p>
        <p class="auth-link">
            已有账号？ <a href="{{ url_for('auth.login') }}">立即登录</a>
        </p>
    </div>
</div>
{% endblock %}
