{% extends "base.html" %}

{% block title %}系统设置 - WiseReporter{% endblock %}

{% block content %}
<div class="page-header">
    <h1>系统设置</h1>
</div>

<div class="settings-container">
    <div class="settings-section">
        <h2>基本设置</h2>
        <div class="form-group">
            <label>系统名称</label>
            <input type="text" value="WiseReporter" readonly>
        </div>
        <div class="form-group">
            <label>版本</label>
            <input type="text" value="1.0.0 (MVP)" readonly>
        </div>
    </div>
    
    <div class="settings-section">
        <h2>采集设置</h2>
        <div class="form-group">
            <label>默认采集间隔（小时）</label>
            <input type="number" value="24">
        </div>
        <div class="form-group">
            <label>Cookie池最小数量</label>
            <input type="number" value="3">
        </div>
        <div class="form-group">
            <label>请求超时（秒）</label>
            <input type="number" value="30">
        </div>
    </div>
    
    <div class="settings-section">
        <h2>周报设置</h2>
        <div class="form-group">
            <label>默认周报周期</label>
            <select>
                <option value="7">7天</option>
                <option value="14">14天</option>
                <option value="30">30天</option>
            </select>
        </div>
        <div class="form-group">
            <label>
                <input type="checkbox" checked>
                自动生成周报
            </label>
        </div>
    </div>
    
    <div class="form-actions">
        <button class="btn btn-primary">保存设置</button>
    </div>
</div>
{% endblock %}
